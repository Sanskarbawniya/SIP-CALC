<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home-Loan Calculator</title>
    <link rel="stylesheet" href="../css/calculator.css">
</head>

<body>
    <div class="container">
        <div class="calculator">
            <h1>Home-Loan Calculator</h1>

            <div class="input-group">
                <label>Loan Amount</label>
                <input type="number" id="loanAmount">
            </div>

            <div class="input-group">
                <label>Annual Interest Rate(%)</label>
                <input type="number" id="interestRate">
            </div>
            <div class="input-group">
                <label>Loan Duration(years)</label>
                <input type="number" id="duration">
            </div>
            <button onclick="calculateHomeLoan()">Calculate</button>
            <div class="result">
                <div class="result-box">
                    <p>Monthly EMI</p>
                    <h3 id="emi">₹0</h3>
                </div>
                <div class="result-box">
                    <p>Principal Amount</p>
                    <h3 id="principalAmount">₹0</h3>
                </div>
                <div class="result-box">
                    <p>Total Interest Payable</p>
                    <h3 id="totalInterest">₹0</h3>
                </div>
                <div class="result-box total">
                    <p>Total Amount</p>
                    <h2 id="totalAmount">₹0</h2>
                </div>
            </div>
        </div>
        <script src="../js/home-loan.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.8.1/math.min.js"></script>
</body>

</html>
