<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Compound-Interest Calculator</title>

  <link rel="stylesheet" href="../css/calculator.css">
</head>

<body>

  <div class="container">
    <div class="calculator">

      <h1>Compound-Interest Calculator</h1>

      <div class="input-group">
        <label>Principal Amount</label>
        <input type="number" id="principal" placeholder="Enter principal amount">
      </div>

      <div class="input-group">
        <label>Rate of interest(%)</label>
        <input type="number" id="rate">
      </div>

      <div class="input-group">
        <label>Time Period(Years)</label>
        <input type="number" id="years">
      </div>

      <button onclick="calculateCompoundInterest()">Calculate</button>

      <div class="result">
        <div class="result-box">
          <p>Principal Amount</p>
          <h3 id="investedAmount">₹0</h3>
        </div>

        <div class="result-box">
          <p>Interest Earned</p>
          <h3 id="estimatedReturns">₹0</h3>
        </div>

        <div class="result-box total">
          <p>Total Amount</p>
          <h2 id="totalValue">₹0</h2>
        </div>

      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.min.js"></script>

  <script src="../js/compound-interest.js"></script>

</body>

</html>
