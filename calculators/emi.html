<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EMI-Calculator</title>

    <link rel="stylesheet" href="../css/calculator.css">
</head>

<body>

    <div class="container">

        <div class="calculator">

            <h1>EMI-Calculator</h1>

            <div class="input-group">
                <label>Loan Amount</label>
                <input type="number" id="principal" placeholder="Enter loan amount">
            </div>

            <div class="input-group">
                <label>Rate of Interest(%)</label>
                <input type="number" id="rate" placeholder="Enter interest rate">
            </div>

            <div class="input-group">
                <label>Loan Period(Years)</label>
                <input type="number" id="years" placeholder="Enter loan tenure">
            </div>

            <button onclick="calculateEMI()">Calculate</button>

            <div class="result">

                <div class="result-box">
                    <p>Monthly EMI</p>
                    <h3 id="monthlyEMI">₹0</h3>
                </div>

                <div class="result-box">
                    <p>Total Interest</p>
                    <h3 id="totalInterest">₹0</h3>
                </div>

                <div class="result-box total">
                    <p>Total Payment</p>
                    <h2 id="totalPayment">₹0</h2>
                </div>

            </div>

        </div>

    </div>

    <script src="../js/emi.js"></script>

</body>

</html>
