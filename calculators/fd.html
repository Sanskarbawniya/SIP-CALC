<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FD-Calculator</title>

  <link rel="stylesheet" href="../css/calculator.css">
</head>

<body>

  <div class="container">

    <div class="calculator">

      <h1>FD-Calculator</h1>

      <div class="input-group">
        <label>Investment Amount</label>
        <input
          type="number"
          id="principal"
          placeholder="Enter investment amount"
        >
      </div>

      <div class="input-group">
        <label> Rate of interest(%)</label>
        <input
          type="number"
          id="rate"
          placeholder="Enter annual interest rate"
        >
      </div>

      <div class="input-group">
        <label>Time Period(Years)</label>
        <input
          type="number"
          id="years"
          placeholder="Enter time period"
        >
      </div>

      <button onclick="calculateFD()">Calculate</button>

      <div class="result">

        <div class="result-box">
          <p>Invested Amount</p>
          <h3 id="investedAmount">₹0</h3>
        </div>

        <div class="result-box">
          <p>Estimated Returns</p>
          <h3 id="estimatedReturns">₹0</h3>
        </div>

        <div class="result-box total">
          <p>Total Value</p>
          <h2 id="totalValue">₹0</h2>
        </div>

      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.1/math.min.js"></script>

  <script src="../js/fd.js"></script>

</body>
</html>
